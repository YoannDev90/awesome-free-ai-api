name: Add a provider
description: Suggest a new free AI inference provider for the list.
title: "Add provider: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this form to suggest a new provider for the list.
        Fill only the required details: name, URL, and models.

  - type: input
    id: provider_name
    attributes:
      label: Provider name
      description: The name that should appear in the table.
    validations:
      required: true

  - type: input
    id: provider_url
    attributes:
      label: Provider URL
      description: Main website or landing page for the provider.
      placeholder: https://example.com
    validations:
      required: true