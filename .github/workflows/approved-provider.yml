name: Add approved provider to README

on:
    issues:
        types:
            - labeled

permissions:
    contents: write
    issues: read

jobs:
    update-readme:
        if: github.event.label.name == 'APPROVED'
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Append provider to README
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');

                      const body = context.payload.issue.body || '';

                      function extract(label) {
                        const pattern = new RegExp(`### ${label}\\s+([^#]+)`, 'i');
                        const match = body.match(pattern);
                        return match ? match[1].trim() : '';
                      }

                      const name = extract('Provider name');
                      const url = extract('Provider URL');
                      const modelsBlock = extract('Supported models');

                      if (!name || !url || !modelsBlock) {
                        core.setFailed('Missing required issue fields: Provider name, Provider URL, or Supported models.');
                        return;
                      }

                      const models = modelsBlock
                        .split(/\r?\n/)
                        .map((line) => line.replace(/^[-*]\s*/, '').trim())
                        .filter(Boolean)
                        .join('<br>');

                      const readmePath = 'README.md';
                      const readme = fs.readFileSync(readmePath, 'utf8');
                      const row = `| [${name}](${url}) | ${models} | [Requirements](https://gratisfy.xyz/providers) | ✅ | ${new Date().toISOString().slice(0, 10)} | [Status](https://gratisfy.xyz/status) |`;

                      if (readme.includes(`| [${name}](${url}) |`)) {
                        core.info('Provider already exists in README, skipping update.');
                        return;
                      }

                      const marker = '| [Mistral Codestral](https://docs.mistral.ai/getting-started/models)                          | [Models](https://gratisfy.xyz/terminal?cap=none&providers=mistral-codestral)   | [Requirements](https://gratisfy.xyz/providers) | ✅      | 2026-04-22   | [Status](https://gratisfy.xyz/status) |';
                      if (!readme.includes(marker)) {
                        core.setFailed('Could not find the provider table insertion point in README.md.');
                        return;
                      }

                      const updated = readme.replace(marker, `${marker}\n${row}`);
                      fs.writeFileSync(readmePath, updated);

            - name: Commit README update
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add README.md
                  git commit -m "Add approved provider to README" || exit 0
                  git push
